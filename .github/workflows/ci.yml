name: CI

# Triggers: run on every push and on every pull request targeting main.
# This means every commit you push gets checked automatically.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-run:
    # The machine GitHub spins up to run this job.
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repo's code onto the runner machine.
      # Without this, the runner has no access to your files.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install a specific Python version.
      # Pinning the version means CI never breaks because GitHub upgraded Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install ruff.
      # 'pip install' here installs into the runner's virtualenv, not your machine.
      - name: Install ruff
        run: pip install ruff==0.15.20

      # Step 4: Lint all Python files.
      # If ruff finds any issues, it exits with a non-zero code and the job fails.
      - name: Lint with ruff
        run: ruff check .

      # Step 5: Run the playground script.
      # If it throws an exception, the job fails. Proves the code actually executes.
      - name: Run playground
        run: python exercises/neovim/playground.py
