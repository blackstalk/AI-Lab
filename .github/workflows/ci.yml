name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  # Runs immediately on push. Fast — usually done in under 10 seconds.
  # If this fails, the test job never starts.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.20

      - name: Lint
        run: ruff check .

  # ── Job 2: Claude API smoke test ───────────────────────────────────────────
  # Verifies ANTHROPIC_API_KEY secret is set and the API is reachable.
  # ANTHROPIC_API_KEY must be stored in Settings → Secrets → Actions.
  claude:
    needs: lint
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install anthropic SDK
        run: pip install anthropic

      - name: Call Claude API
        run: python exercises/claude-code/hello_claude.py

  # ── Job 3: Test ────────────────────────────────────────────────────────────
  # Only starts after lint passes (needs: lint).
  # Runs in parallel with the claude job — both need lint, neither needs each other.
  # The matrix multiplies this job into 3 parallel runs — one per Python version.
  test:
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      # fail-fast: false means all matrix versions run to completion even if
      # one fails. Useful for seeing which versions break, not just that one did.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      # ${{ matrix.python-version }} is a template expression.
      # Actions replaces it with "3.11", "3.12", or "3.13" in each parallel run.
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run playground (Python ${{ matrix.python-version }})
        run: python exercises/neovim/playground.py
